<html lang="zh-CN">
<head>
<base href="https://www.doge24190.top/">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>在线BASE64编码解码</title>
<meta name="keywords" content="在线base64编码解码,base64加密解密,base64中文在线解码">
<meta name="description" content="本工具可以将字符串做base64编码加密，或者将base64加密之后的字符串还原">
<meta http-equiv="Cache-Control" content="no-transform">
<meta http-equiv="Cache-Control" content="no-siteapp">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, user-scalable=yes">
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .container {
        max-width: 800px;
        width: 100%;
        background: #fff;
        padding: 20px;
        margin: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
    }
    h2 {
        color: #333;
    }
    textarea {
        width: 100%;
        height: 100px;
        padding: 10px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 4px;
        resize: vertical;
    }
    button {
        background-color: #007bff;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-right: 10px;
    }
    button:hover {
        background-color: #0056b3;
    }
    .footer {
        margin-top: 20px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>明文:</h2>
    <textarea class="form-control" name="message" id="source"> CNM </textarea>

    <button class="btn btn-primary" onclick="base64_encode();">
        编 码<i class="glyphicon glyphicon-chevron-right"></i>
    </button>
    <button class="btn btn-primary" onclick="base64_decode();">
        <i class="glyphicon glyphicon-chevron-left"></i>解 码
    </button>

    <h2>BASE64:</h2>
    <textarea class="form-control" name="cipher" id="result"></textarea>
</div>

<div class="footer">
    <p>&copy; 2024 <a href="http://www.doge24190.top" target="_top"> By Doge24190 </a></p>
</div>

<script src="js/crypto-js.js"></script>
<script src="js/jquery-3.6.0.min.js"></script>
<script type="text/javascript">
    function base64_encode() {
        if ($("#source").val() == "") {
            $("#source").focus();
            return false;
        }
        var str = CryptoJS.enc.Utf8.parse($("#source").val());
        var base64 = CryptoJS.enc.Base64.stringify(str);
        $("#result").val(base64);
    }
    function base64_decode() {
        if ($("#result").val() == "") {
            $("#result").focus();
            return false;
        }
        var words = CryptoJS.enc.Base64.parse($("#result").val());
        $("#source").val(words.toString(CryptoJS.enc.Utf8));
    }
</script>

</body>
</html>
